# ── Font ─────────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ── Cursor ───────────────────────────────────────────────────────
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
shell_integration     no-cursor

# ── Window chrome ────────────────────────────────────────────────
window_padding_width  8
hide_window_decorations titlebar-only
confirm_os_window_close 0
background_opacity    0.92
background_blur       20

# ── Tab bar ──────────────────────────────────────────────────────
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  " {index}: {title} "

active_tab_foreground   #1e1e2e
active_tab_background   #cba6f7
active_tab_font_style   bold
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244

# ── Splits (layouts) ────────────────────────────────────────────
enabled_layouts splits,stack

# Vertical split   (new pane to the right)  — Cmd+D
map cmd+d       launch --location=vsplit --cwd=current
# Horizontal split (new pane below)         — Cmd+Shift+D
map cmd+shift+d launch --location=hsplit --cwd=current

# Navigate between splits — Cmd+arrow or Cmd+hjkl
map cmd+left    neighboring_window left
map cmd+right   neighboring_window right
map cmd+up      neighboring_window up
map cmd+down    neighboring_window down

map cmd+h       neighboring_window left
map cmd+l       neighboring_window right
map cmd+k       neighboring_window up
map cmd+j       neighboring_window down

# Resize splits — Cmd+Option+arrow
map cmd+opt+left    resize_window narrower 2
map cmd+opt+right   resize_window wider 2
map cmd+opt+up      resize_window taller 2
map cmd+opt+down    resize_window shorter 2

# Toggle zoom (stack) current split — Cmd+Z
map cmd+z toggle_layout stack

# Close split — Cmd+W
map cmd+w close_window

# ── Tabs ─────────────────────────────────────────────────────────
map cmd+t       new_tab_with_cwd
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+6       goto_tab 6
map cmd+7       goto_tab 7
map cmd+8       goto_tab 8
map cmd+9       goto_tab 9

# ── Scrollback ───────────────────────────────────────────────────
scrollback_lines 10000

# ── Color scheme (Catppuccin Mocha) ──────────────────────────────
foreground #cdd6f4
background #1e1e2e

color0  #45475a
color8  #585b70
color1  #f38ba8
color9  #f38ba8
color2  #a6e3a1
color10 #a6e3a1
color3  #f9e2af
color11 #f9e2af
color4  #89b4fa
color12 #89b4fa
color5  #cba6f7
color13 #cba6f7
color6  #94e2d5
color14 #94e2d5
color7  #bac2de
color15 #a6adc8

selection_foreground #1e1e2e
selection_background #f5e0dc

# ── macOS specific ───────────────────────────────────────────────
macos_option_as_alt         yes
macos_quit_when_last_window_closed yes
macos_titlebar_color        background
